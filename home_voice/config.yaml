name: Home Voice
version: "0.1.0"
slug: home_voice
description: Lokaler LLM-Sprachassistent (Phi-4-mini via llama.cpp), OpenAI-kompatibel, mit Gedächtnis über Brain
url: https://github.com/pquandel2-alt/ha-home-voice-addon
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 8099
# Fester LAN-Port, damit HA-Integrationen (OpenAI Conversation) und Voice-Satellites
# den OpenAI-kompatiblen Endpunkt stabil unter http://<HA-IP>:8099/v1 erreichen.
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: OpenAI-kompatibler Endpunkt (/v1) + Ingress-Panel
panel_icon: mdi:account-voice
panel_title: Home Voice
panel_admin: false
homeassistant_api: true
hassio_api: true
# Modell-Downloads + llama.cpp brauchen spürbar RAM; wird beim Start geprüft.
options:
  model: phi-4-mini
  context_size: 4096
  threads: 2
  temperature: 0.7
  brain_enabled: false
  brain_url: ""
schema:
  model: "list(phi-4-mini|qwen2.5-3b|gemma3-1b)"
  context_size: int(512,32768)
  threads: int(1,32)
  temperature: float(0,2)
  brain_enabled: bool
  brain_url: str?
